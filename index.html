<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
      crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
<style>
        *{ font-family: "Geist", sans-serif; font-optical-sizing: auto; }
</style>
</head>
<body class="bg-base-200">
    <header class="w-[80%] mx-auto mb-1 sticky top-0 z-10 bg-base-200">
<h1 class="font-bold text-4xl text-[#002C5C] mb-4 pt-6">Job Application Tracker</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-base-100 p-4 rounded-2xl py-5">
        <p class="font-semibold text-[#002C5C]">Total</p>
        <p id="total" class="font-bold text-[#002C5C]">0</p>
    </div>
    <div class="bg-base-100 p-4 rounded-2xl">
        <p class="font-semibold text-[#002C5C]">Interview</p>
        <p id="interview" class="font-bold text-green-500">0</p>
    </div>
    <div class="bg-base-100 p-4 rounded-2xl">
        <p class="font-semibold text-[#002C5C]">Rejected</p>
        <p id="rejected" class="font-bold text-red-600">0</p>
    </div>
</div>
<br><br><hr class="border-t border-base-200 mb-4">
</header>



</body>
</html>
